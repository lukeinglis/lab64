[mod]
name = "Lab 64: Animal Pack"
version = "0.1.0"
description = "Custom animal character replacements for team play. Replaces four racers with Dalmatian, Yellow Lab, Black Cat, and Orange Cat."

[mod.authors]
names = ["Lab 64 Team"]

[mod.characters]
# Each character replaces an existing racer slot.
# Slot assignments are TBD pending owner confirmation.
# Default assumptions: Mario -> Dalmatian, Luigi -> Yellow Lab, Peach -> Black Cat, Toad -> Orange Cat

[mod.characters.dalmatian]
type = "dog"
slot = "TBD"

[mod.characters.yellow_lab]
type = "dog"
slot = "TBD"

[mod.characters.black_cat]
type = "cat"
slot = "TBD"

[mod.characters.orange_cat]
type = "cat"
slot = "TBD"
